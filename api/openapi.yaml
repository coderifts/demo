openapi: "3.0.3"
info:
  title: Acme E-Commerce API
  version: "2.0.0"
  description: "Public API for the Acme e-commerce platform. Provides user management, order processing, and payment handling."
  contact:
    name: API Team
    email: api@acme.example.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: https://api.acme.example.com
    description: Production
security:
  - bearerAuth: []
  - oauth2: [users:admin]
paths:
  # ── KEPT from base, with field-level changes ──────────────────────
  /users/{id}:
    get:
      summary: Get user by ID
      description: "Retrieves a single user by their unique identifier."
      operationId: getUser
      tags:
        - Users
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: "The unique user identifier."
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
              example:
                id: "usr_001"
                email: "alice@example.com"
                username: "alice"
                role: "admin"
        "404":
          description: User not found
        # REMOVED: "401" response that existed in base → Structural
  /users:
    post:
      summary: Create user
      description: "Creates a new user account. Requires email, name, and email_verified (newly required)."
      operationId: createUser
      tags:
        - Users
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
            example:
              email: "bob@example.com"
              name: "Bob Smith"
              email_verified: false
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Invalid request body
        "409":
          description: Email already registered
  /orders:
    get:
      summary: List orders
      description: "Returns all orders, optionally filtered by status."
      operationId: listOrders
      tags:
        - Orders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
        "401":
          description: Unauthorized
    post:
      summary: Create order
      description: "Creates a new order for a user. Requires at least one item."
      operationId: createOrder
      tags:
        - Orders
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "400":
          description: Invalid order data
  /orders/{id}:
    get:
      summary: Get order by ID
      description: "Retrieves a single order by its unique identifier."
      operationId: getOrder
      tags:
        - Orders
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          description: "The unique identifier of the order."
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Order not found
  /payments/charge:
    post:
      summary: Charge payment
      description: "Processes a payment charge for an order. Auth downgraded from bearer+OAuth2 to API key only."
      operationId: chargePayment
      tags:
        - Payments
      # SECURITY CHANGE: was bearerAuth + oauth2, now apiKey only → Security
      security:
        - apiKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeRequest"
      responses:
        "200":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"
        "402":
          description: Payment failed
  # ── REMOVED from base (path removals) ─────────────────────────────
  # /payments/refund → REMOVED (Structural, covered by exception EXC-002)
  # /internal/health → REMOVED (Structural, covered by exception EXC-003)
  # ── NEW endpoints (not in base — non-breaking additions) ──────────
  /payments/v2/refund:
    post:
      summary: Refund payment (v2)
      description: "New refund endpoint replacing the deprecated /payments/refund. Supports partial and full refunds with improved error handling."
      operationId: refundPaymentV2
      tags:
        - Payments
      security:
        - bearerAuth: []
        - oauth2: [payments:write]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequest"
      responses:
        "200":
          description: Refund processed
        "404":
          description: Transaction not found
        "422":
          description: Invalid refund amount
  /v1/legacy/status:
    get:
      summary: Legacy status endpoint
      description: "Returns system status. This endpoint is deprecated and will be removed in a future version."
      operationId: legacyStatus
      deprecated: true
      x-deprecated-date: "2026-01-15"
      x-sunset-date: "2026-07-15"
      x-deprecated-replacement: "GET /internal/health"
      tags:
        - Internal
      security:
        - apiKey: []
      responses:
        "200":
          description: Status response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: "Current system status."
                  uptime:
                    type: integer
                    description: "System uptime in seconds."
  /webhooks/subscribe:
    post:
      summary: Subscribe to webhooks
      description: "Register a URL to receive webhook notifications for order and payment events."
      operationId: subscribeWebhook
      tags:
        - Webhooks
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
              properties:
                url:
                  type: string
                  description: "The HTTPS URL to receive webhook events."
              # REMOVED: 'events' property that was required in base → Structural
      responses:
        "201":
          description: Subscribed
        "400":
          description: Invalid URL
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKey:
      type: apiKey
      name: X-API-Key
      in: header
      description: "API key for legacy and payment endpoints."
    oauth2:
      type: oauth2
      description: "OAuth 2.0 authorization for sensitive operations."
      flows:
        authorizationCode:
          authorizationUrl: https://auth.acme.example.com/authorize
          tokenUrl: https://auth.acme.example.com/token
          scopes:
            payments:write: "Create and manage payments"
            users:admin: "Manage user accounts"
  schemas:
    User:
      type: object
      description: "Represents a registered user account."
      required:
        - id
        - email
        # CHANGED: 'name' → 'username' (name removed from required, username added)
        - username
      properties:
        id:
          type: string
          description: "Unique user identifier."
        email:
          type: string
          description: "User's email address."
        # RENAMED: 'name' → 'username' (name property removed → Structural)
        username:
          type: string
          description: "Display name (renamed from 'name' in v1)."
        phone:
          type: string
          # CHANGED: nullable: true removed → Dangerous Non-Breaking (NULLABLE_REMOVED)
        role:
          type: string
          description: "User role (e.g., admin, member)."
        created_at:
          type: string
          format: date-time
          description: "Account creation timestamp."
    CreateUserRequest:
      type: object
      description: "Request body for creating a new user."
      required:
        - email
        - name
        # NEW REQUIRED FIELD: email_verified → Structural (request-property-became-required)
        - email_verified
      properties:
        email:
          type: string
          description: "User's email address."
        name:
          type: string
          description: "User's full name."
        phone:
          type: string
        email_verified:
          type: boolean
          description: "Whether the email has been verified."
    Order:
      type: object
      description: "Represents a customer order."
      required:
        - id
        - user_id
        - total
        - status
      properties:
        id:
          type: string
          description: "Unique order identifier."
        user_id:
          type: string
          description: "ID of the user who placed the order."
        # TYPE CHANGE: total was 'number', now 'string' → Behavioral
        total:
          type: string
          description: "Order total (changed from number to string for precision)."
        currency:
          type: string
          default: "EUR"
          # CHANGED: default value changed from 'USD' to 'EUR' → Dangerous Non-Breaking
        # ENUM CHANGE: removed 'pending' from enum → Behavioral
        status:
          type: string
          enum: [confirmed, shipped, delivered]
          description: "Current order status."
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderItem:
      type: object
      description: "A single item in an order."
      required:
        - product_id
        - quantity
        - price
      properties:
        product_id:
          type: string
          description: "Product identifier."
        quantity:
          type: integer
          description: "Number of units ordered."
        price:
          type: number
          description: "Unit price."
    CreateOrderRequest:
      type: object
      description: "Request body for creating a new order."
      required:
        - user_id
        - items
      properties:
        user_id:
          type: string
          description: "ID of the user placing the order."
        items:
          type: array
          description: "Line items to include in the order."
          items:
            $ref: "#/components/schemas/OrderItem"
    ChargeRequest:
      type: object
      description: "Request body for processing a payment."
      required:
        - order_id
        - amount
        - currency
      properties:
        order_id:
          type: string
          description: "ID of the order to charge."
        amount:
          type: number
          description: "Amount to charge."
        currency:
          type: string
          description: "ISO 4217 currency code."
    PaymentResult:
      type: object
      description: "Result of a payment operation."
      required:
        - transaction_id
        - status
      properties:
        transaction_id:
          type: string
          description: "Unique transaction identifier."
        status:
          type: string
          description: "Payment status (e.g., success, failed)."
    TokenResponse:
      type: object
      description: "OAuth2 token response returned by the /auth/token endpoint."
      required:
        - access_token
        - token_type
        - expires_in
      properties:
        access_token:
          type: string
          description: "Bearer access token for API authentication."
        token_type:
          type: string
          default: "Bearer"
          description: "Token type (always Bearer)."
        expires_in:
          type: integer
          default: 3600
          description: "Token lifetime in seconds."
    RefundRequest:
      type: object
      description: "Request body for processing a refund."
      required:
        - transaction_id
        - reason
      properties:
        transaction_id:
          type: string
          description: "ID of the transaction to refund."
        reason:
          type: string
          description: "Reason for the refund."
        amount:
          type: number
          description: "Partial refund amount. If omitted, full refund is issued."
