openapi: "3.0.3"
info:
  title: Acme API
  version: "1.4.0"
paths:
  /users/{id}:
    get:
      summary: Get user by ID
      operationId: getUser
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
  /users:
    post:
      summary: Create user
      operationId: createUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
  /orders:
    get:
      summary: List orders
      operationId: listOrders
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Orders list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      summary: Create order
      operationId: createOrder
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderRequest"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /orders/{id}:
    get:
      summary: Get order by ID
      operationId: getOrder
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Order found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
  /payments/charge:
    post:
      summary: Charge payment
      operationId: chargePayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChargeRequest"
      responses:
        "200":
          description: Payment processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentResult"
  /payments/refund:
    post:
      summary: Refund payment
      operationId: refundPayment
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefundRequest"
      responses:
        "200":
          description: Refund processed
  /webhooks/subscribe:
    post:
      summary: Subscribe to webhooks
      operationId: subscribeWebhook
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - url
                - events
              properties:
                url:
                  type: string
                events:
                  type: array
                  items:
                    type: string
      responses:
        "201":
          description: Subscribed
  /internal/health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: OK
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    User:
      type: object
      required:
        - id
        - email
        - name
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
    CreateUserRequest:
      type: object
      required:
        - email
        - name
      properties:
        email:
          type: string
        name:
          type: string
        phone:
          type: string
    Order:
      type: object
      required:
        - id
        - user_id
        - total
        - status
      properties:
        id:
          type: string
        user_id:
          type: string
        total:
          type: number
        currency:
          type: string
          default: "USD"
        status:
          type: string
          enum: [pending, confirmed, shipped, delivered]
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    OrderItem:
      type: object
      required:
        - product_id
        - quantity
        - price
      properties:
        product_id:
          type: string
        quantity:
          type: integer
        price:
          type: number
    CreateOrderRequest:
      type: object
      required:
        - user_id
        - items
      properties:
        user_id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/OrderItem"
    ChargeRequest:
      type: object
      required:
        - order_id
        - amount
        - currency
      properties:
        order_id:
          type: string
        amount:
          type: number
        currency:
          type: string
    PaymentResult:
      type: object
      required:
        - transaction_id
        - status
      properties:
        transaction_id:
          type: string
        status:
          type: string
    RefundRequest:
      type: object
      required:
        - transaction_id
        - reason
      properties:
        transaction_id:
          type: string
        reason:
          type: string
        amount:
          type: number
